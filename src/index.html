<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ff5fa2" />
  <title>Efya's Learning Garden 🌺</title>

  <!-- Installable on phone/tablet home screens (Android + desktop via the
       manifest; the apple-* metas cover iPhone/iPad "Add to Home Screen"). -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Efya" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- The whole app renders into #app. One screen is visible at a time. -->
  <main id="app" aria-live="polite"></main>

  <!-- Floating sound toggle, present on every screen. -->
  <button id="soundToggle" class="sound-toggle" title="Sound on/off" aria-label="Sound on or off">🔊</button>

  <!-- Content first so window.EFYA exists, then progress + guide, then app. -->
  <script src="data/content.js"></script>
  <script src="progress.js"></script>
  <script src="guide.js"></script>
  <script src="app.js"></script>
  <script>
    // Offline support when hosted (http/https). Skipped on file://, where
    // service workers aren't available and the app already runs fine.
    if ("serviceWorker" in navigator && window.isSecureContext &&
        location.protocol !== "file:") {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    }
  </script>
</body>
</html>
